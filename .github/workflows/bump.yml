name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New plugin version (e.g. 2.0.0-beta)'
        required: true
        type: string
      min_app_version:
        description: 'Obsidian minAppVersion (leave empty to keep current)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "version '$VERSION' is not valid semver" >&2
            exit 1
          fi
          git fetch --tags origin
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "tag $VERSION already exists" >&2
            exit 1
          fi
          if git ls-remote --exit-code --heads origin "bump-$VERSION" >/dev/null 2>&1; then
            echo "branch bump-$VERSION already exists on origin; delete it first" >&2
            exit 1
          fi

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: package.json

      - name: Bump manifest.json, versions.json, package.json
        env:
          VERSION: ${{ inputs.version }}
          MIN_APP_VERSION: ${{ inputs.min_app_version }}
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const version = process.env.VERSION;
          const inputMin = process.env.MIN_APP_VERSION;

          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          const minAppVersion = inputMin || manifest.minAppVersion;
          manifest.version = version;
          manifest.minAppVersion = minAppVersion;
          fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2) + '\n');

          const versions = JSON.parse(fs.readFileSync('versions.json', 'utf8'));
          versions[version] = minAppVersion;
          fs.writeFileSync('versions.json', JSON.stringify(versions, null, 2) + '\n');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = version;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          EOF

      - name: Push bump branch
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "bump-$VERSION"
          git add manifest.json versions.json package.json
          git commit -m "bump version to $VERSION"
          git push -u origin "bump-$VERSION"

      - name: Open PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          pr_url=$(gh pr create \
            --base main \
            --head "bump-$VERSION" \
            --title "bump version to $VERSION" \
            --body "Automated version bump to $VERSION.")
          echo "url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Wait for build check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: gh pr checks "$PR_URL" --watch --fail-fast --interval 10

      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: gh pr merge "$PR_URL" --squash --delete-branch

      - name: Tag merge commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.pr.outputs.url }}
          VERSION: ${{ inputs.version }}
        run: |
          sha=$(gh pr view "$PR_URL" --json mergeCommit -q .mergeCommit.oid)
          if [ -z "$sha" ] || [ "$sha" = "null" ]; then
            echo "could not resolve merge commit sha for $PR_URL" >&2
            exit 1
          fi
          git fetch origin "$sha"
          git tag "$VERSION" "$sha"
          git push origin "$VERSION"

  release:
    needs: bump
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ inputs.version }}
